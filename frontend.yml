- name: Frontend Setup
  hosts: all
  become: yes
  tasks:
    - name: Install Nodejs Repo files
      ansible.builtin.shell: curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -

    - name: Install nginx & nodejs
      ansible.builtin.dnf:
        name:
          - '@nginx:1.26'
          -  nodejs
        state: present

    - name: update Nginx conf
      ansible.builtin.copy:
        src: nginx.conf
        dest: /etc/nginx/nginx.cong


